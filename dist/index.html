<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Velvora Admin</title>
    <meta name="theme-color" content="#c8a96a">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
        
        /* Login Screen */
        #loginScreen { padding: 30px 20px; }
        .login-header { text-align: center; margin-bottom: 40px; }
        .login-logo { 
            font-size: 36px; font-weight: 800; letter-spacing: 4px; 
            background: linear-gradient(135deg, #c8a96a, #e8d5a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .login-subtitle { color: #666; font-size: 14px; }
        
        .box { background: linear-gradient(145deg, #1a1a1a, #141414); padding: 25px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #222; }
        .box-title { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        
        input, select { 
            width: 100%; padding: 16px; margin-bottom: 15px; 
            border: 1px solid #333; background: #0a0a0a; color: #fff; 
            border-radius: 12px; font-size: 15px; font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }
        input:focus, select:focus { border-color: #c8a96a; outline: none; box-shadow: 0 0 0 3px rgba(200,169,106,0.1); }
        
        button { 
            width: 100%; padding: 16px; border: none; border-radius: 12px; 
            font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }
        .btn-primary { 
            background: linear-gradient(135deg, #c8a96a, #b8954d); 
            color: #0a0a0a; 
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-secondary { background: #1a1a1a; color: #888; border: 1px solid #333; }
        .btn-danger { background: #3d1a1a; color: #ff4444; }
        
        #message { 
            padding: 16px; border-radius: 12px; margin-top: 15px; 
            text-align: center; font-size: 14px; display: none; font-weight: 500;
        }
        .success { background: linear-gradient(135deg, #1b4332, #0f2a1f); color: #4caf50; border: 1px solid #1b4332; }
        .error { background: linear-gradient(135deg, #3d1a1a, #2a0f0f); color: #ff4444; border: 1px solid #3d1a1a; }
        .loading { background: linear-gradient(135deg, #1a2a3d, #0f1f2a); color: #2196f3; border: 1px solid #1a2a3d; }
        
        /* Main App */
        #mainApp { display: none; }
        .header { 
            background: linear-gradient(180deg, #1a1a1a, #0a0a0a); 
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #1a1a1a;
            position: sticky; top: 0; z-index: 100;
        }
        .header h2 { font-size: 18px; font-weight: 600; }
        .header button { 
            width: auto; padding: 8px 16px; font-size: 13px; 
            background: #1a1a1a; color: #888; border: 1px solid #333; border-radius: 8px;
        }
        
        /* Stats Grid */
        .stats-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; 
        }
        .stat-card { 
            background: linear-gradient(145deg, #1a1a1a, #141414); 
            padding: 25px 20px; border-radius: 20px; text-align: center; 
            border: 1px solid #222; position: relative; overflow: hidden;
        }
        .stat-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, #c8a96a, #e8d5a3);
        }
        .stat-icon { 
            width: 50px; height: 50px; background: rgba(200,169,106,0.1); 
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px; font-size: 20px; color: #c8a96a;
        }
        .stat-value { font-size: 28px; font-weight: 700; color: #fff; }
        .stat-label { font-size: 12px; color: #666; margin-top: 5px; }
        
        /* Sections */
        .section { padding: 20px; padding-bottom: 100px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-title { font-size: 18px; font-weight: 600; }
        
        /* Tables */
        .table-card { 
            background: linear-gradient(145deg, #1a1a1a, #141414); 
            border-radius: 16px; overflow: hidden; border: 1px solid #222;
        }
        table { width: 100%; border-collapse: collapse; }
        th { 
            padding: 15px; text-align: left; font-size: 11px; text-transform: uppercase; 
            letter-spacing: 1px; color: #666; background: #0a0a0a; font-weight: 600;
        }
        td { padding: 15px; border-bottom: 1px solid #1a1a1a; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        
        /* Product Row */
        .product-row { display: flex; align-items: center; gap: 12px; }
        .product-img { 
            width: 50px; height: 50px; border-radius: 10px; object-fit: cover; 
            background: #1a1a1a;
        }
        .product-info h4 { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        .product-info p { font-size: 12px; color: #666; }
        
        /* Action Buttons */
        .action-btns { display: flex; gap: 8px; }
        .action-btn { 
            width: 36px; height: 36px; border-radius: 10px; border: none; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .edit-btn { background: rgba(200,169,106,0.1); color: #c8a96a; }
        .delete-btn { background: rgba(255,68,68,0.1); color: #ff4444; }
        .edit-btn:active, .delete-btn:active { transform: scale(0.9); }
        
        /* Bottom Nav */
        .nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(180deg, #0a0a0a, #141414); 
            display: flex; padding: 12px 10px; border-top: 1px solid #1a1a1a;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }
        .nav button { 
            flex: 1; background: none; color: #666; font-size: 11px; 
            border-radius: 12px; padding: 10px 5px; display: flex; flex-direction: column; 
            align-items: center; gap: 6px;
        }
        .nav button.active { color: #c8a96a; background: rgba(200,169,106,0.1); }
        .nav i { font-size: 20px; }
        
        /* FAB */
        .fab {
            position: fixed; bottom: 90px; right: 20px;
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #c8a96a, #b8954d);
            border-radius: 50%; border: none; color: #0a0a0a; font-size: 24px;
            box-shadow: 0 10px 30px rgba(200,169,106,0.3);
        }
        .fab:active { transform: scale(0.95); }
        
        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); padding: 20px; z-index: 200;
            align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            padding: 30px; border-radius: 24px; width: 100%; max-width: 400px;
            border: 1px solid #222;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .modal-header h3 { font-size: 20px; font-weight: 600; }
        .modal-close { 
            width: 36px; height: 36px; border-radius: 50%; background: #1a1a1a; 
            border: none; color: #666; font-size: 18px; cursor: pointer;
        }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
        
        /* Empty State */
        .empty-state { 
            text-align: center; padding: 40px 20px; color: #666; 
        }
        .empty-state i { font-size: 48px; margin-bottom: 15px; opacity: 0.5; }
        
        /* Badge */
        .badge { 
            padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
        }
        .badge-success { background: rgba(76,175,80,0.1); color: #4caf50; }
        .badge-warning { background: rgba(255,193,7,0.1); color: #ffc107; }
        .badge-pending { background: rgba(33,150,243,0.1); color: #2196f3; }
        
        /* Page */
        .page { display: none; }
        .page.active { display: block; }
        
        /* Settings */
        .setting-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; border-bottom: 1px solid #1a1a1a;
        }
        .setting-item:last-child { border-bottom: none; }
        .setting-info h4 { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
        .setting-info p { font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div id="loginScreen">
        <div class="login-header">
            <div class="login-logo">VELVORA</div>
            <p class="login-subtitle">Admin Panel</p>
        </div>
        
        <div class="box">
            <div class="box-title">Login</div>
            <input type="email" id="email" placeholder="Email" value="admin@velvora.com">
            <input type="password" id="password" placeholder="Password" value="admin123">
            <button class="btn-primary" onclick="doLogin()">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </div>
        
        <div class="box">
            <div class="box-title">Server Connection</div>
            <input type="text" id="serverUrl" value="" placeholder="https://your-app.onrender.com">
            <button class="btn-secondary" onclick="testServer()">
                <i class="fas fa-wifi"></i> Test Connection
            </button>
        </div>
        
        <div id="message"></div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp">
        <div class="header">
            <h2 id="pageTitle">Dashboard</h2>
            <button onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
        
        <!-- Dashboard -->
        <div id="pageDashboard" class="page active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-shopping-bag"></i></div>
                    <div class="stat-value" id="totalOrders">0</div>
                    <div class="stat-label">Total Orders</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-dollar-sign"></i></div>
                    <div class="stat-value" id="totalRevenue">$0</div>
                    <div class="stat-label">Revenue</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-box"></i></div>
                    <div class="stat-value" id="totalProducts">0</div>
                    <div class="stat-label">Products</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-value" id="totalCustomers">0</div>
                    <div class="stat-label">Customers</div>
                </div>
            </div>
            
            <div class="section">
                <div class="section-header">
                    <h3 class="section-title">Recent Orders</h3>
                </div>
                <div class="table-card">
                    <table>
                        <thead>
                            <tr><th>Order</th><th>Customer</th><th>Amount</th><th>Status</th></tr>
                        </thead>
                        <tbody id="ordersTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- Products -->
        <div id="pageProducts" class="page">
            <div class="section">
                <div class="section-header">
                    <h3 class="section-title">All Products</h3>
                </div>
                <div class="table-card">
                    <table>
                        <thead>
                            <tr><th>Product</th><th>Price</th><th>Stock</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="productsTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- Settings -->
        <div id="pageSettings" class="page">
            <div class="section">
                <div class="section-header">
                    <h3 class="section-title">Settings</h3>
                </div>
                <div class="box">
                    <div class="setting-item">
                        <div class="setting-info">
                            <h4>Server URL</h4>
                            <p id="currentServerUrl">http://10.161.199.3:5000</p>
                        </div>
                    </div>
                    <div class="setting-item">
                        <div class="setting-info">
                            <h4>Change Server</h4>
                            <input type="text" id="settingsServerUrl" placeholder="http://192.168.1.x:5000" style="margin-top:10px;margin-bottom:0;">
                        </div>
                    </div>
                    <button class="btn-secondary" onclick="saveSettings()" style="margin-top:15px;">
                        <i class="fas fa-save"></i> Save Settings
                    </button>
                </div>
                
                <div class="box" style="margin-top:20px;">
                    <div class="setting-item">
                        <div class="setting-info">
                            <h4>App Version</h4>
                            <p>1.0.0</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="nav">
            <button class="active" onclick="showPage('Dashboard')">
                <i class="fas fa-th-large"></i>
                <span>Home</span>
            </button>
            <button onclick="showPage('Products')">
                <i class="fas fa-box"></i>
                <span>Products</span>
            </button>
            <button onclick="showPage('Settings')">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </button>
        </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="productModalTitle">Add Product</h3>
                <button class="modal-close" onclick="closeProductModal()">&times;</button>
            </div>
            <input type="hidden" id="editProductId">
            <input type="text" id="prodName" placeholder="Product Name">
            <input type="number" id="prodPrice" placeholder="Price" step="0.01">
            <input type="text" id="prodImage" placeholder="Image URL">
            <input type="number" id="prodStock" placeholder="Stock Quantity">
            <select id="prodCategory">
                <option value="men">Men</option>
                <option value="women">Women</option>
                <option value="kids">Kids</option>
                <option value="accessories">Accessories</option>
                <option value="shoes">Shoes</option>
            </select>
            <div class="modal-buttons">
                <button class="btn-primary" onclick="saveProduct()">
                    <i class="fas fa-save"></i> Save
                </button>
                <button class="btn-secondary" onclick="closeProductModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        var API_URL = localStorage.getItem('apiUrl') || 'http://localhost:5000/api';
        var authToken = localStorage.getItem('velvoraAdminToken');
        
        // Initialize
        document.getElementById('serverUrl').value = API_URL.replace('/api', '');
        document.getElementById('settingsServerUrl').value = API_URL.replace('/api', '');
        document.getElementById('currentServerUrl').textContent = API_URL.replace('/api', '');
        
        if (authToken) {
            showMain();
            loadData();
        }
        
        function showMessage(msg, type) {
            var el = document.getElementById('message');
            el.textContent = msg;
            el.className = type;
            el.style.display = 'block';
        }
        
        function testServer() {
            var url = document.getElementById('serverUrl').value;
            showMessage('Testing connection...', 'loading');
            
            var xhr = new XMLHttpRequest();
            xhr.timeout = 10000;
            xhr.open('GET', url + '/health', true);
            
            xhr.onload = function() {
                if (xhr.status >= 200 && xhr.status < 300) {
                    API_URL = url + '/api';
                    localStorage.setItem('apiUrl', API_URL);
                    showMessage('✓ Connected! Server is online.', 'success');
                } else {
                    showMessage('✗ Error: ' + xhr.status, 'error');
                }
            };
            
            xhr.onerror = function() {
                showMessage('✗ Cannot connect. Check URL.', 'error');
            };
            
            xhr.ontimeout = function() {
                showMessage('✗ Timeout. Server not reachable.', 'error');
            };
            
            xhr.send();
        }
        
        function doLogin() {
            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;
            
            showMessage('Logging in...', 'loading');
            
            var xhr = new XMLHttpRequest();
            xhr.open('POST', API_URL + '/auth/login', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            
            xhr.onload = function() {
                if (xhr.status >= 200 && xhr.status < 300) {
                    var data = JSON.parse(xhr.responseText);
                    localStorage.setItem('velvoraAdminToken', data.token);
                    authToken = data.token;
                    showMessage('✓ Login successful!', 'success');
                    setTimeout(function() {
                        showMain();
                        loadData();
                    }, 500);
                } else {
                    showMessage('✗ Login failed. Check credentials.', 'error');
                }
            };
            
            xhr.onerror = function() {
                showMessage('✗ Connection error.', 'error');
            };
            
            xhr.send(JSON.stringify({email: email, password: password}));
        }
        
        function showMain() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        }
        
        function loadData() {
            loadOrders();
            loadProducts();
        }
        
        function loadOrders() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', API_URL + '/orders', true);
            xhr.setRequestHeader('Authorization', 'Bearer ' + authToken);
            
            xhr.onload = function() {
                if (xhr.status >= 200 && xhr.status < 300) {
                    var data = JSON.parse(xhr.responseText);
                    var orders = data.orders || data;
                    
                    document.getElementById('totalOrders').textContent = orders.length;
                    var revenue = orders.reduce(function(s, o) { return s + (o.total || 0); }, 0);
                    document.getElementById('totalRevenue').textContent = '$' + revenue.toFixed(0);
                    
                    var statusClass = { 'Pending': 'badge-pending', 'Processing': 'badge-warning', 'Delivered': 'badge-success' };
                    
                    document.getElementById('ordersTable').innerHTML = orders.slice(0, 10).map(function(o) {
                        return '<tr><td>' + (o.orderId || 'N/A').substring(0,8) + '</td><td>' + (o.customerName || 'N/A') + '</td><td>$' + (o.total || 0).toFixed(2) + '</td><td><span class="badge ' + (statusClass[o.status] || 'badge-pending') + '">' + (o.status || 'Pending') + '</span></td></tr>';
                    }).join('') || '<tr><td colspan="4" class="empty-state">No orders yet</td></tr>';
                }
            };
            
            xhr.send();
        }
        
        function loadProducts() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', API_URL + '/products/admin/all', true);
            xhr.setRequestHeader('Authorization', 'Bearer ' + authToken);
            
            xhr.onload = function() {
                if (xhr.status >= 200 && xhr.status < 300) {
                    var products = JSON.parse(xhr.responseText);
                    document.getElementById('totalProducts').textContent = products.length;
                    
                    document.getElementById('productsTable').innerHTML = products.map(function(p) {
                        return '<tr>' +
                            '<td><div class="product-row"><img src="' + (p.image || 'https://via.placeholder.com/50') + '" class="product-img" onerror="this.src=\'https://via.placeholder.com/50\'"><div class="product-info"><h4>' + p.name + '</h4><p>' + (p.category || '') + '</p></div></div></td>' +
                            '<td>$' + (p.price || 0).toFixed(2) + '</td>' +
                            '<td>' + (p.stock || 0) + '</td>' +
                            '<td><div class="action-btns"><button class="action-btn edit-btn" onclick="editProduct(\'' + p._id + '\')"><i class="fas fa-edit"></i></button><button class="action-btn delete-btn" onclick="deleteProduct(\'' + p._id + '\')"><i class="fas fa-trash"></i></button></div></td>' +
                        '</tr>';
                    }).join('') || '<tr><td colspan="4" class="empty-state">No products yet</td></tr>';
                }
            };
            
            xhr.send();
        }
        
        function showPage(page) {
            document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
            document.querySelectorAll('.nav button').forEach(function(b) { b.classList.remove('active'); });
            
            document.getElementById('page' + page).classList.add('active');
            event.target.closest('button').classList.add('active');
            document.getElementById('pageTitle').textContent = page;
            
            if (page === 'Products') loadProducts();
        }
        
        function logout() {
            localStorage.removeItem('velvoraAdminToken');
            location.reload();
        }
        
        // Product Functions
        function showAddProduct() {
            document.getElementById('productModalTitle').textContent = 'Add Product';
            document.getElementById('editProductId').value = '';
            document.getElementById('prodName').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodImage').value = '';
            document.getElementById('prodStock').value = '';
            document.getElementById('productModal').classList.add('active');
        }
        
        function closeProductModal() {
            document.getElementById('productModal').classList.remove('active');
        }
        
        function editProduct(id) {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', API_URL + '/products/' + id, true);
            xhr.setRequestHeader('Authorization', 'Bearer ' + authToken);
            
            xhr.onload = function() {
                if (xhr.status >= 200 && xhr.status < 300) {
                    var p = JSON.parse(xhr.responseText);
                    document.getElementById('productModalTitle').textContent = 'Edit Product';
                    document.getElementById('editProductId').value = p._id;
                    document.getElementById('prodName').value = p.name;
                    document.getElementById('prodPrice').value = p.price;
                    document.getElementById('prodImage').value = p.image || '';
                    document.getElementById('prodStock').value = p.stock;
                    document.getElementById('prodCategory').value = p.category || 'men';
                    document.getElementById('productModal').classList.add('active');
                }
            };
            
            xhr.send();
        }
        
        function saveProduct() {
            var id = document.getElementById('editProductId').value;
            var data = {
                name: document.getElementById('prodName').value,
                price: document.getElementById('prodPrice').value,
                image: document.getElementById('prodImage').value || 'https://via.placeholder.com/300',
                stock: document.getElementById('prodStock').value,
                category: document.getElementById('prodCategory').value,
                tag: 'new'
            };
            
            var method = id ? 'PUT' : 'POST';
            var url = id ? API_URL + '/products/' + id : API_URL + '/products';
            
            var xhr = new XMLHttpRequest();
            xhr.open(method, url, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.setRequestHeader('Authorization', 'Bearer ' + authToken);
            
            xhr.onload = function() {
                if (xhr.status >= 200 && xhr.status < 300) {
                    closeProductModal();
                    loadProducts();
                    alert(id ? '✓ Product updated!' : '✓ Product added!');
                } else {
                    alert('✗ Error saving product');
                }
            };
            
            xhr.send(JSON.stringify(data));
        }
        
        function deleteProduct(id) {
            if (!confirm('Delete this product?')) return;
            
            var xhr = new XMLHttpRequest();
            xhr.open('DELETE', API_URL + '/products/' + id, true);
            xhr.setRequestHeader('Authorization', 'Bearer ' + authToken);
            
            xhr.onload = function() {
                if (xhr.status >= 200 && xhr.status < 300) {
                    loadProducts();
                    alert('✓ Product deleted!');
                } else {
                    alert('✗ Error deleting product');
                }
            };
            
            xhr.send();
        }
        
        function saveSettings() {
            var url = document.getElementById('settingsServerUrl').value;
            API_URL = url + '/api';
            localStorage.setItem('apiUrl', API_URL);
            document.getElementById('currentServerUrl').textContent = url;
            alert('✓ Settings saved!');
        }
    </script>
</body>
</html>
