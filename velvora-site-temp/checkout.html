<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Velvora Luxury</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="checkout.css">
</head>

<body>

<div class="menu-overlay" onclick="toggleMenu()"></div>

<header class="header">
    <div class="logo" onclick="window.location.href='index.html'">VELVORA</div>

    <div class="menu-toggle" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </div>

    <nav class="nav">
        <a href="index.html">Home</a>
        <a href="index.html#products">Shop</a>
    </nav>

    <div class="right-section">
        <div class="icons">
            <a href="login.html" class="user-icon">
                <i class="far fa-user"></i>
            </a>
        </div>
    </div>
</header>

<div class="checkout-page">
    <div class="checkout-container">
        <div class="checkout-form">
            <h2>Checkout</h2>
            
            <div class="checkout-section">
                <h3><span>1</span> Contact Information</h3>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="checkoutEmail" placeholder="Your email" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="checkoutPhone" placeholder="Your phone" required>
                </div>
            </div>

            <div class="checkout-section">
                <h3><span>2</span> Shipping Address</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="firstName" placeholder="First name" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="lastName" placeholder="Last name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Street Address</label>
                    <input type="text" id="address" placeholder="Street address" required>
                </div>
                <div class="form-group">
                    <label>Apartment, suite, etc. (optional)</label>
                    <input type="text" id="address2" placeholder="Apartment, suite, etc.">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" id="city" placeholder="City" required>
                    </div>
                    <div class="form-group">
                        <label>Postal Code</label>
                        <input type="text" id="postalCode" placeholder="Postal code" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Country</label>
                    <select id="country">
                        <option value="US">United States</option>
                        <option value="UK">United Kingdom</option>
                        <option value="CA">Canada</option>
                        <option value="AU">Australia</option>
                        <option value="IN">India</option>
                    </select>
                </div>
            </div>

            <div class="checkout-section">
                <h3><span>3</span> Payment Method</h3>
                <div class="payment-methods">
                    <label class="payment-option">
                        <input type="radio" name="payment" value="card" checked>
                        <div class="payment-card">
                            <i class="fas fa-credit-card"></i>
                            <span>Credit / Debit Card</span>
                        </div>
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="payment" value="paypal">
                        <div class="payment-card">
                            <i class="fab fa-paypal"></i>
                            <span>PayPal</span>
                        </div>
                    </label>
                </div>
                
                <div class="card-details" id="cardDetails">
                    <div class="form-group">
                        <label>Card Number</label>
                        <input type="text" placeholder="1234 5678 9012 3456" maxlength="19">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Expiry Date</label>
                            <input type="text" placeholder="MM/YY" maxlength="5">
                        </div>
                        <div class="form-group">
                            <label>CVV</label>
                            <input type="text" placeholder="123" maxlength="3">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Name on Card</label>
                        <input type="text" placeholder="Name on card">
                    </div>
                </div>
            </div>

            <button class="place-order-btn" onclick="placeOrder()">Place Order</button>
        </div>

        <div class="checkout-summary">
            <h3>Order Summary</h3>
            <div class="summary-items" id="summaryItems"></div>
            <div class="summary-totals">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="summarySubtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <div class="summary-row">
                    <span>Tax</span>
                    <span id="summaryTax">$0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="summaryTotal">$0.00</span>
                </div>
            </div>
            <div class="summary-coupon">
                <input type="text" placeholder="Coupon code">
                <button>Apply</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = localStorage.getItem('apiUrl') || 'http://localhost:5000/api';
    let cart = JSON.parse(localStorage.getItem('velvoraCart')) || [];
    let user = JSON.parse(localStorage.getItem('velvoraUser'));

    if (user) {
        document.getElementById('checkoutEmail').value = user.email || '';
    }

    function renderSummary() {
        const container = document.getElementById('summaryItems');
        
        if (cart.length === 0) {
            container.innerHTML = '<p class="empty-cart">Your cart is empty</p>';
            return;
        }

        container.innerHTML = cart.map(item => `
            <div class="summary-item">
                <img src="${item.image}" alt="${item.name}">
                <div>
                    <h4>${item.name}</h4>
                    <p>Qty: ${item.quantity}</p>
                </div>
                <span>$${(item.price * item.quantity).toFixed(2)}</span>
            </div>
        `).join('');

        const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const tax = subtotal * 0.08;
        const total = subtotal + tax;

        document.getElementById('summarySubtotal').textContent = `$${subtotal.toFixed(2)}`;
        document.getElementById('summaryTax').textContent = `$${tax.toFixed(2)}`;
        document.getElementById('summaryTotal').textContent = `$${total.toFixed(2)}`;
    }

    async function placeOrder() {
        if (cart.length === 0) {
            alert('Your cart is empty!');
            return;
        }

        const email = document.getElementById('checkoutEmail').value;
        const firstName = document.getElementById('firstName').value;
        const lastName = document.getElementById('lastName').value;
        const address = document.getElementById('address').value;

        if (!email || !firstName || !lastName || !address) {
            alert('Please fill in all required fields!');
            return;
        }

        const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const tax = subtotal * 0.08;
        const total = subtotal + tax;

        const orderData = {
            customerEmail: email,
            customerName: firstName + ' ' + lastName,
            items: cart.map(item => ({
                productId: item._id || item.id,
                name: item.name,
                price: item.price,
                quantity: item.quantity,
                image: item.image,
                size: item.size
            })),
            subtotal: subtotal,
            tax: tax,
            shipping: 0,
            total: total,
            shippingAddress: {
                address: address,
                city: document.getElementById('city').value,
                postalCode: document.getElementById('postalCode').value,
                country: document.getElementById('country').value,
                phone: document.getElementById('checkoutPhone').value
            }
        };

        try {
            const token = localStorage.getItem('velvoraToken');
            const response = await fetch(`${API_URL}/orders`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    ...(token && { Authorization: `Bearer ${token}` })
                },
                body: JSON.stringify(orderData)
            });

            const data = await response.json();

            if (!response.ok) {
                alert(data.message || 'Failed to place order');
                return;
            }

            localStorage.removeItem('velvoraCart');
            
            // Save order to localStorage for profile/order pages
            const existingOrders = JSON.parse(localStorage.getItem('velvoraOrders')) || [];
            const newOrder = {
                orderId: data.order.orderId,
                _id: data.order._id,
                items: orderData.items,
                total: total,
                subtotal: subtotal,
                tax: tax,
                status: 'Pending',
                createdAt: new Date().toISOString(),
                customer: {
                    name: orderData.customerName,
                    email: orderData.customerEmail
                },
                shippingAddress: orderData.shippingAddress
            };
            existingOrders.unshift(newOrder);
            localStorage.setItem('velvoraOrders', JSON.stringify(existingOrders));
            
            // Also save to sessionStorage for immediate access on success page
            sessionStorage.setItem('lastOrder', JSON.stringify(newOrder));
            
            window.location.href = 'order-success.html?orderId=' + data.order.orderId;
        } catch (error) {
            alert('Connection error. Please try again.');
            console.error(error);
        }
    }

    document.querySelectorAll('input[name="payment"]').forEach(radio => {
        radio.addEventListener('change', function() {
            const cardDetails = document.getElementById('cardDetails');
            cardDetails.style.display = this.value === 'card' ? 'block' : 'none';
        });
    });

    renderSummary();
</script>

</body>
</html>
